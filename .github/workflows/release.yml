name: Build & Release Desktop App

on:
  release:
    types: [published]   # Se activa cuando creas un Release en GitHub
  workflow_dispatch:      # O manualmente desde la pestaña Actions

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # 1. Descargar el codigo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configurar Node.js y construir el frontend
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm install

      - name: Build frontend (static export)
        working-directory: app/frontend
        env:
          NEXT_EXPORT: "1"
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
        run: npm run build

      - name: Move frontend build to backend folder
        run: |
          New-Item -ItemType Directory -Force -Path "app/backend/../frontend_dist"
          Copy-Item -Recurse -Force "app/frontend/out/*" "app/frontend/../frontend_dist/"
        shell: pwsh

      # 3. Configurar Python y construir el .exe
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: app/backend
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .exe with PyInstaller
        working-directory: app/backend
        run: pyinstaller cimentaciones.spec --clean

      # 4. Subir el .exe al Release de GitHub
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: app/backend/dist/CimentacionesPro.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 5. Subir como artefacto (cuando se corre manualmente)
      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: CimentacionesPro-Windows
          path: app/backend/dist/CimentacionesPro.exe
          retention-days: 7
